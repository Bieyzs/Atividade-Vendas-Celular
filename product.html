<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TequíCell — Detalhes do Produto</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header" id="header">
        <div class="header-top"><div class="container"><p>Frete grátis para compras acima de R$ 499 | Parcelamento em até 12x sem juros</p></div></div>
        <nav class="navbar"><div class="container navbar-container">
            <a href="index.html" class="logo">
                <svg width="42" height="42" viewBox="0 0 42 42" fill="none"><rect x="2" y="2" width="38" height="38" rx="10" fill="url(#lg1)" stroke="url(#lg2)" stroke-width="1.5"/><path d="M14 11a1 1 0 011-1h12a1 1 0 011 1v20a1 1 0 01-1 1H15a1 1 0 01-1-1V11z" stroke="#fff" stroke-width="1.5"/><line x1="18" y1="28" x2="24" y2="28" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><circle cx="21" cy="24" r="1.5" fill="#fff"/><path d="M17 14h8" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><defs><linearGradient id="lg1" x1="2" y1="2" x2="40" y2="40"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#2563eb"/></linearGradient><linearGradient id="lg2" x1="2" y1="2" x2="40" y2="40"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#60a5fa"/></linearGradient></defs></svg>
                <span class="logo-text">Tequí<span class="logo-accent">Cell</span></span>
            </a>
            <div class="search-bar"><input type="text" placeholder="Buscar produtos..."><button class="search-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button></div>
            <div class="nav-actions">
                <button class="nav-btn cart-btn" id="cartBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg><span class="cart-count" id="cartCount">0</span></button>
            </div>
        </div></nav>
    </header>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header"><h3><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg> Meu Carrinho (<span id="cartItemCount">0</span>)</h3><button class="cart-close" id="cartClose"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div class="cart-items" id="cartItems"><div class="cart-empty" id="cartEmpty"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg><p>Seu carrinho está vazio</p></div></div>
        <div class="cart-footer" id="cartFooter" style="display:none;"><div class="cart-summary"><div class="cart-subtotal"><span>Subtotal</span><span id="cartSubtotal">R$ 0,00</span></div><div class="cart-shipping"><span>Frete</span><span class="free-shipping">Grátis</span></div><div class="cart-total"><span>Total</span><span id="cartTotal">R$ 0,00</span></div></div><button class="btn-checkout">Finalizar Compra</button><button class="btn-clear-cart" id="clearCartBtn">Limpar Carrinho</button></div>
    </div>
    <div class="cart-overlay" id="cartOverlay"></div>

    <main class="product-detail" id="productDetail">
        <div class="container">
            <div class="breadcrumb" id="breadcrumb"></div>
            <div class="product-detail-grid">
                <div class="product-detail-image" id="productImage"></div>
                <div class="product-detail-info" id="productInfo"></div>
            </div>
            <div class="product-detail-specs" id="productSpecs"></div>
            <div class="product-detail-reviews" id="productReviews"></div>
        </div>
    </main>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 TequíCell. Todos os direitos reservados.</p>
    <p>Desenvolvido por Gabriel Barroso De Souza</p></div></div></footer>
    <button class="back-to-top" id="backToTop"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></button>
    <script src="script.js"></script>
</body>
</html>
